version: 1
category: secret
rules:
  - id: SEC-AWS-KEY
    pattern: '(?:AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[0-9A-Z]{16,}'
    title: "AWS access key"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-AWS-SECRET
    pattern: '(?i)aws_secret_access_key\s*[=:]\s*[A-Za-z0-9/+=]{30,}'
    title: "AWS secret access key"
    severity: CRITICAL
    confidence: 0.90
    tags: [credential]
  - id: SEC-ANTHROPIC
    pattern: 'sk-ant-[a-zA-Z0-9\-_]{20,}'
    title: "Anthropic API key"
    severity: CRITICAL
    confidence: 0.98
    tags: [credential]
  - id: SEC-OPENAI
    pattern: 'sk-proj-[a-zA-Z0-9]{20,}'
    title: "OpenAI project key"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-OPENAI-V2
    pattern: 'sk-[a-zA-Z0-9]{40,}'
    title: "OpenAI API key (long form)"
    severity: CRITICAL
    confidence: 0.85
    tags: [credential]
  - id: SEC-STRIPE
    pattern: '(?:sk_live_|pk_live_|sk_test_|pk_test_|rk_live_|rk_test_)[a-zA-Z0-9]{20,}'
    title: "Stripe key"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-GITHUB-TOKEN
    pattern: '(?:ghp_|gho_|ghu_|ghs_|ghr_)[a-zA-Z0-9]{36,}'
    title: "GitHub token"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-GITHUB-PAT
    pattern: 'github_pat_[a-zA-Z0-9_]{22,}'
    title: "GitHub fine-grained PAT"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-GITLAB
    pattern: 'glpat-[a-zA-Z0-9\-_]{20,}'
    title: "GitLab personal access token"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-GOOGLE
    pattern: 'AIza[0-9A-Za-z\-_]{35}'
    title: "Google API key"
    severity: HIGH
    confidence: 0.90
    tags: [credential]
  - id: SEC-SLACK-TOKEN
    pattern: 'xox[bpors]-[0-9a-zA-Z\-]{10,}'
    title: "Slack token"
    severity: HIGH
    confidence: 0.90
    tags: [credential]
  - id: SEC-SLACK-WEBHOOK
    pattern: 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+'
    title: "Slack webhook URL"
    severity: HIGH
    confidence: 0.95
    tags: [credential]
  - id: SEC-DISCORD-WEBHOOK
    pattern: 'https://discord(?:app)?\.com/api/webhooks/\d+/[a-zA-Z0-9_\-]+'
    title: "Discord webhook URL"
    severity: HIGH
    confidence: 0.95
    tags: [credential]
  - id: SEC-PRIVKEY
    pattern: '-----BEGIN (?:RSA |EC |OPENSSH |PGP |DSA )?PRIVATE KEY-----'
    title: "Private key"
    severity: CRITICAL
    confidence: 0.98
    tags: [credential]
  - id: SEC-JWT
    pattern: 'eyJ[A-Za-z0-9\-_]{10,}\.eyJ[A-Za-z0-9\-_]{10,}\.[A-Za-z0-9\-_.+/=]+'
    title: "JWT token"
    severity: MEDIUM
    confidence: 0.70
    tags: [credential]
  - id: SEC-CONNSTR
    pattern: '(?:mongodb|postgres|mysql|redis|amqp)://[^:\s]+:[^@\s]+@'
    title: "Connection string with credentials"
    severity: HIGH
    confidence: 0.90
    tags: [credential]
  - id: SEC-BEARER
    pattern: '(?i)(?:authorization|bearer)\s*[:=]\s*Bearer\s+[A-Za-z0-9\-_.~+/]+=*'
    title: "Bearer token in header"
    severity: HIGH
    confidence: 0.80
    tags: [credential]
  - id: SEC-SENDGRID
    pattern: 'SG\.[a-zA-Z0-9\-_]{10,}\.[a-zA-Z0-9\-_]{10,}'
    title: "SendGrid API key"
    severity: HIGH
    confidence: 0.95
    tags: [credential]
  - id: SEC-TWILIO
    pattern: 'SK[0-9a-fA-F]{32}'
    title: "Twilio API key"
    severity: HIGH
    confidence: 0.80
    tags: [credential]
  - id: SEC-NPM-TOKEN
    pattern: 'npm_[a-zA-Z0-9]{36,}'
    title: "npm access token"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-PYPI-TOKEN
    pattern: 'pypi-[A-Za-z0-9\-_]{50,}'
    title: "PyPI API token"
    severity: CRITICAL
    confidence: 0.95
    tags: [credential]
  - id: SEC-HEX-SECRET
    pattern: '(?i)(?:secret(?:_key)?|api[_-]?key|access[_-]?token|auth[_-]?token)\s*[=:]\s*["''][a-f0-9]{32,}["'']'
    title: "Hex-encoded secret in assignment"
    severity: HIGH
    confidence: 0.72
    tags: [credential]
