# DefenseClaw Permissive Policy
# Development mode — scans and warns, blocks only CRITICAL
name: permissive
description: Permissive policy for development and testing

admission:
  scan_on_install: true
  allow_list_bypass_scan: true

skill_actions:
  critical:
    file: quarantine
    runtime: disable
    install: block
  high:
    file: none
    runtime: enable
    install: none
  medium:
    file: none
    runtime: enable
    install: none
  low:
    file: none
    runtime: enable
    install: none
  info:
    file: none
    runtime: enable
    install: none

scanner_overrides: {}

first_party_allow_list:
  - target_type: plugin
    target_name: defenseclaw
    reason: first-party DefenseClaw plugin
    source_path_contains: [".defenseclaw", ".openclaw/extensions"]
  - target_type: skill
    target_name: codeguard
    reason: first-party DefenseClaw skill
    source_path_contains: [".defenseclaw", ".openclaw/workspace/skills", ".openclaw/skills"]

guardrail:
  block_threshold: 4
  alert_threshold: 3
  cisco_trust_level: advisory
  patterns:
    injection:
      - "ignore previous"
      - "jailbreak"
      - "do anything now"
      - "dan mode"
    secrets:
      - "-----begin private"
      - "-----begin openssh"
      - "aws_secret_access"
    exfiltration:
      - "/etc/shadow"
      - "exfiltrate"
  severity_mappings:
    injection: HIGH
    secrets: MEDIUM
    exfiltration: HIGH

firewall:
  default_action: allow
  blocked_destinations:
    - "169.254.169.254"
    - "fd00:ec2::254"
  allowed_domains: []
  allowed_ports: []

# Periodic rescan / drift detection settings (not policy file watching).
watch:
  rescan_enabled: true
  rescan_interval_min: 120

webhooks: []

enforcement:
  max_enforcement_delay_seconds: 5

audit:
  log_all_actions: true
  log_scan_results: true
  retention_days: 30
