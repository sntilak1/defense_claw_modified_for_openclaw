# DefenseClaw-curated skill scanner policy: balanced
# Compatible with cisco-ai-skill-scanner ScanPolicy.from_file()
version: 1
name: balanced
description: "Balanced detection — catches real threats, low false-positive rate for development workflows"

thresholds:
  permission_risk: 0.6
  data_access_risk: 0.5
  code_quality_risk: 0.7

analyzers:
  static:
    enabled: true
    max_file_size_kb: 512
  behavioral:
    enabled: true
    trace_depth: 3
  llm:
    enabled: false

severity_overrides: {}

disabled_rules: []
