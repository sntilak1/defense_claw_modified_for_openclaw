# DefenseClaw-curated CodeGuard scanner policy: default
# Compatible with CodeGuardScanner custom rules loading
version: 1
name: default
description: "Default CodeGuard policy — core security patterns"

rule_dirs:
  - rules/
  - custom/

max_file_size_kb: 256

severity_overrides: {}

disabled_rules: []

file_extensions:
  - .py
  - .js
  - .ts
  - .go
  - .java
  - .rb
  - .yaml
  - .yml
  - .json
  - .sh
  - .bash
