name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make go-lint

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make go-test-cov
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  go-build:
    name: Go Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make gateway-cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}

  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: make py-lint
      - run: make cli-test-cov
      - uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage-py.xml

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv pip install pip pip-audit
      # TODO: Remove --ignore-vuln CVE-2026-4539 once pygments >= 2.19.3 is released
      # CVE-2026-4539: Low severity ReDoS in AdlLexer (local attack vector only)
      # TODO: Remove --ignore-vuln CVE-2026-28684 once cisco-ai-skill-scanner
      # releases a version that allows python-dotenv >= 1.2.2. Scanner 2.0.9
      # (the latest as of this commit) still pins python-dotenv==1.2.1.
      # CVE-2026-28684: python-dotenv 1.2.1 — pulled in only via out-of-process
      # Python scanner subprocesses, not linked into the gateway.
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip is released.
      # CVE-2026-3219: pip's interpretation conflict with concatenated tar/ZIP
      # archives. Medium severity; impacts only attacker-supplied package
      # archives. We install exclusively from PyPI via uv with locked hashes
      # (uv.lock), so this attack surface is not exposed in CI or runtime.
      - run: uv run pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-28684 --ignore-vuln CVE-2026-3219

  ts-build-test:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make ts-test

  ts-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/defenseclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev

  rego-test:
    name: Rego Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - run: make rego-test

  make-test:
    name: make test (unified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v4
      - run: make pycli
      - run: make test
