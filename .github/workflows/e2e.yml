name: E2E

on:
  push:
    branches: [main, demo]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core E2E
    if: ${{ github.event_name != 'schedule' }}
    runs-on: [self-hosted, Linux, ARM64, e2e]
    timeout-minutes: 30
    env:
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BIFROST_API_KEY: ${{ secrets.BIFROST_API_KEY }}
      SPLUNK_ACCESS_TOKEN: ${{ secrets.SPLUNK_ACCESS_TOKEN }}
      SPLUNK_REALM: ${{ secrets.SPLUNK_REALM }}
      E2E_PROFILE: core
      DEFENSECLAW_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}-core
      E2E_TEST_PREFIX: e2e-gh-${{ github.run_id }}-${{ github.run_attempt }}-core
      E2E_REQUIRE_AGENT_INSTALL: "false"
      E2E_REQUIRE_AGENT_SCAN: "false"
      E2E_REQUIRE_GUARDRAIL: "false"
      E2E_REQUIRE_LIVE_MCP: "false"
      E2E_ENABLE_PLUGIN_LIFECYCLE: "false"
      E2E_REQUIRE_PLUGIN_LIFECYCLE: "false"
      E2E_ENABLE_RECOVERY: "false"
      E2E_REQUIRE_RECOVERY: "false"
      # Phase 6 observability: SPLUNK_MOCK_PORT is the in-process
      # Python HEC mock that captures envelope bodies to SPLUNK_MOCK_LOG
      # so observability_assertions.sh can grep for sourcetypes (e.g.
      # defenseclaw:judge) deterministically. The real Splunk container
      # started above is the primary sink; the mock runs alongside as a
      # second sink on a different port.
      SPLUNK_MOCK_PORT: "18088"
      SPLUNK_MOCK_LOG: /tmp/splunk-mock-core.log
      SPLUNK_MOCK_PID_FILE: /tmp/splunk-mock-core.pid
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Clean DefenseClaw
        run: |
          if [ -f "${SPLUNK_MOCK_PID_FILE}" ]; then
            kill -TERM "$(cat "${SPLUNK_MOCK_PID_FILE}")" 2>/dev/null || true
            rm -f "${SPLUNK_MOCK_PID_FILE}"
          fi
          rm -f "${SPLUNK_MOCK_LOG}"

          # Bring down the Splunk compose stack from any prior run BEFORE
          # the host-wide reclaim, so docker can release its volumes.
          cd bundles/splunk_local_bridge/compose 2>/dev/null && {
            export SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0
            docker compose -f docker-compose.ci.yml down -v 2>/dev/null || true
            cd -
          } || true

          # Generic host-wide cleanup (docker reclaim, runner _work TTL,
          # /tmp/go-build* etc.) — see scripts/runner-cleanup.sh.
          bash scripts/runner-cleanup.sh

          rm -rf ~/.defenseclaw
          rm -f ~/.local/bin/defenseclaw-gateway
          rm -rf ~/.openclaw/extensions/defenseclaw*
          rm -rf ~/.openclaw/workspace/skills/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          rm -rf ~/.openclaw/skills/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          rm -rf ~/.openclaw/extensions/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          rm -rf /tmp/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          prefix = os.environ["E2E_TEST_PREFIX"]
          cfg_path = Path(os.path.expanduser("~/.openclaw/openclaw.json"))
          quarantine_root = Path(os.path.expanduser("~/.defenseclaw/quarantine"))
          for sub in ("skills", "plugins"):
              root = quarantine_root / sub
              if root.is_dir():
                  for child in root.iterdir():
                      if child.name.startswith(prefix):
                          shutil.rmtree(child, ignore_errors=True)

          if not cfg_path.exists():
              raise SystemExit(0)

          with cfg_path.open() as f:
              cfg = json.load(f)

          changed = False
          workspace = Path(
              cfg.get("agents", {}).get("defaults", {}).get("workspace")
              or os.path.expanduser("~/.openclaw/workspace")
          )
          global_skills = Path(os.path.expanduser("~/.openclaw/skills"))

          skills = cfg.setdefault("skills", {}).setdefault("entries", {})
          kept_skills = {
              name: meta
              for name, meta in skills.items()
              if not str(name).startswith(prefix)
              and ((workspace / "skills" / name).is_dir() or (global_skills / name).is_dir())
          }
          if kept_skills != skills:
              cfg["skills"]["entries"] = kept_skills
              changed = True

          plugins = cfg.setdefault("plugins", {})
          for section in ("entries", "installs"):
              bucket = plugins.get(section)
              if not isinstance(bucket, dict):
                  continue
              next_bucket = {
                  name: meta
                  for name, meta in bucket.items()
                  if not str(name).startswith(prefix) and str(name) != "defenseclaw"
              }
              if next_bucket != bucket:
                  plugins[section] = next_bucket
                  changed = True

          if changed:
              with cfg_path.open("w") as f:
                  json.dump(cfg, f, indent=2)
                  f.write("\n")
              print("OpenClaw config normalized for persistent E2E runner")
          else:
              print("OpenClaw config already clean")
          PY

          # Fail fast if cleanup couldn't buy back enough headroom. The
          # previous threshold of 8 GB still allowed the disk to fill mid-run
          # because Splunk's working set + go build temp dirs + checkout
          # consume ~9-10 GB at peak. Bumping to 10 GB gives us the headroom
          # to survive a worst-case run.
          FREE_GB=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
          echo "--- Final free space: ${FREE_GB}G ---"
          if [ "${FREE_GB:-0}" -lt 10 ]; then
            echo "::error::Runner disk below 10 GB free after cleanup (${FREE_GB}G)."
            echo "::error::Runner needs maintenance: install an ACTIONS_RUNNER_HOOK_JOB_STARTED"
            echo "::error::script on the host, or grow the root disk. See e2e.yml 'Clean DefenseClaw'."
            exit 1
          fi

      - name: Start Splunk
        run: |
          cd bundles/splunk_local_bridge
          bash splunk/package_local_mode_app.sh
          cd compose
          export SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for Splunk HEC..."
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8088/services/collector/health && break
            sleep 5
          done

          # Lower minFreeSpace for CI runners with limited disk.
          # Default is 5000MB; CI runners sometimes have < 5GB free → HTTP 503.
          echo "Disk free: $(df -h / | tail -1)"
          docker compose -f docker-compose.ci.yml exec -T -u splunk splunk bash -c '
            for d in /opt/splunk/etc/system/local /opt/splunk/etc/apps/search/local; do
              echo "Checking $d/server.conf ..."
              if [ -d "$d" ]; then
                mkdir -p "$d"
                SCONF="$d/server.conf"
                if ! grep -q "minFreeSpace" "$SCONF" 2>/dev/null; then
                  printf "\n[diskUsage]\nminFreeSpace = 500\n" >> "$SCONF"
                  echo "  -> patched $SCONF"
                else
                  echo "  -> already has minFreeSpace"
                fi
                cat "$SCONF"
                break
              fi
            done
          '
          echo "Restarting Splunk to apply minFreeSpace..."
          docker compose -f docker-compose.ci.yml restart splunk
          echo "Waiting for Splunk HEC after restart..."
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8088/services/collector/health && break
            sleep 5
          done

      # Phase 6: lightweight HEC mock so observability_assertions.sh
      # can grep envelopes by sourcetype without scraping Splunk's
      # indexed storage. Runs as a second audit sink alongside the
      # real Splunk container (configured below).
      - name: Start Splunk HEC mock
        run: |
          mkdir -p "$(dirname "${SPLUNK_MOCK_LOG}")"
          : >"${SPLUNK_MOCK_LOG}"
          nohup python3 test/e2e/splunk_hec_mock.py \
              --port "${SPLUNK_MOCK_PORT}" \
              --log "${SPLUNK_MOCK_LOG}" \
              >/tmp/splunk-mock.stdout 2>&1 &
          echo $! > "${SPLUNK_MOCK_PID_FILE}"
          # Wait up to ~5s for the listener to bind before the sidecar
          # starts POSTing; we intentionally hit a bogus path since the
          # mock accepts any path and replies 401 without Auth, which
          # proves the socket is up.
          for i in $(seq 1 10); do
            if curl -sf -o /dev/null -w '%{http_code}' \
                  -X POST http://127.0.0.1:${SPLUNK_MOCK_PORT}/services/collector \
                  | grep -q '401'; then
              echo "splunk-hec-mock up on :${SPLUNK_MOCK_PORT}"
              break
            fi
            sleep 0.5
          done
          ps -p "$(cat "${SPLUNK_MOCK_PID_FILE}")" -o pid,cmd || {
              echo "FAIL: splunk-hec-mock did not start"
              cat /tmp/splunk-mock.stdout || true
              exit 1
          }

      - name: Install DefenseClaw
        run: make install

      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install OPA
        run: |
          if command -v opa >/dev/null 2>&1; then
            opa version
            exit 0
          fi

          case "$(uname -m)" in
            aarch64|arm64) OPA_ARCH="arm64" ;;
            x86_64|amd64) OPA_ARCH="amd64" ;;
            *)
              echo "Unsupported architecture for OPA: $(uname -m)"
              exit 1
              ;;
          esac

          curl -fsSL \
            -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v1.14.1/opa_linux_${OPA_ARCH}_static"
          install -m 0755 /tmp/opa "$HOME/.local/bin/opa"
          opa version

      - name: Init DefenseClaw
        run: |
          defenseclaw init

          echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}" >> ~/.defenseclaw/.env
          echo "DEFENSECLAW_RUN_ID=${DEFENSECLAW_RUN_ID}" >> ~/.defenseclaw/.env
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${SPLUNK_ACCESS_TOKEN:-}" ]; then
            echo "SPLUNK_ACCESS_TOKEN=${SPLUNK_ACCESS_TOKEN}" >> ~/.defenseclaw/.env
            echo "SPLUNK_REALM=${SPLUNK_REALM}" >> ~/.defenseclaw/.env
          fi

          defenseclaw setup skill-scanner \
            --use-behavioral \
            --policy balanced \
            --non-interactive \
            --no-verify

          defenseclaw setup mcp-scanner \
            --analyzers yara \
            --scan-instructions \
            --non-interactive

          OC_MODEL=$(python3 -c "
          import json, os
          try:
              with open(os.path.expanduser('~/.openclaw/openclaw.json')) as f:
                  cfg = json.load(f)
              print(cfg.get('agents',{}).get('defaults',{}).get('model',{}).get('primary',''))
          except Exception:
              print('')
          ")

          MODEL_NAME=""
          API_KEY_ENV=""
          GUARDRAIL_ENABLED=false
          GUARDRAIL_REASON="core profile does not require live guardrail"

          echo "DEFENSECLAW_SPLUNK_HEC_TOKEN=00000000-0000-0000-0000-000000000001" >> ~/.defenseclaw/.env
          export OC_MODEL MODEL_NAME API_KEY_ENV GUARDRAIL_ENABLED GUARDRAIL_REASON
          python3 - <<'PY'
          import os
          import yaml

          cfg_path = os.path.expanduser('~/.defenseclaw/config.yaml')
          with open(cfg_path) as f:
              cfg = yaml.safe_load(f) or {}

          # v4 config schema: legacy `splunk:` block is rejected at startup.
          # Point the local Splunk container (brought up by the "Start
          # Splunk" step above) at the new generic sinks framework.
          cfg.pop('splunk', None)
          mock_port = os.environ.get('SPLUNK_MOCK_PORT', '18088')
          cfg['audit_sinks'] = [
              {
                  'name':    'splunk-local',
                  'kind':    'splunk_hec',
                  'enabled': True,
                  'splunk_hec': {
                      'endpoint':   'http://127.0.0.1:8088/services/collector/event',
                      'token_env':  'DEFENSECLAW_SPLUNK_HEC_TOKEN',
                      'index':      'defenseclaw_local',
                      'source':     'defenseclaw',
                      'sourcetype': 'defenseclaw:json',
                      'verify_tls': False,
                  },
              },
              # Phase 6 mock HEC collector — observability_assertions.sh
              # greps this file for sourcetypes like defenseclaw:judge.
              # Runs on a different port than the real Splunk container
              # so both sinks receive every event in parallel.
              {
                  'name':    'splunk-mock',
                  'kind':    'splunk_hec',
                  'enabled': True,
                  'splunk_hec': {
                      'endpoint':   f'http://127.0.0.1:{mock_port}/services/collector/event',
                      'token_env':  'DEFENSECLAW_SPLUNK_HEC_TOKEN',
                      'index':      'defenseclaw_mock',
                      'source':     'defenseclaw-mock',
                      'sourcetype': 'defenseclaw:json',
                      'verify_tls': False,
                  },
              },
          ]

          cfg.setdefault('guardrail', {})
          cfg['guardrail']['enabled'] = False
          cfg['guardrail']['mode'] = 'observe'

          with open(cfg_path, 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          PY

          defenseclaw-gateway restart || defenseclaw-gateway start
          # Wait up to 30s for the sidecar to become healthy rather than a
          # fixed 5s sleep (self-hosted runners can be slow under load).
          for i in $(seq 1 30); do
            if defenseclaw-gateway status >/dev/null 2>&1; then
              echo "sidecar healthy after ${i}s"
              break
            fi
            sleep 1
          done
          defenseclaw-gateway status || {
            echo "--- gateway.log (tail) ---"
            tail -n 200 ~/.defenseclaw/gateway.log 2>/dev/null || true
            echo "--- gateway.jsonl (tail) ---"
            tail -n 200 ~/.defenseclaw/gateway.jsonl 2>/dev/null || true
            echo "--- watchdog.log (tail) ---"
            tail -n 200 ~/.defenseclaw/watchdog.log 2>/dev/null || true
            exit 1
          }

      - name: Validate gateway.jsonl schema
        run: |
          if [ -f ~/.defenseclaw/gateway.jsonl ]; then
            python3 scripts/assert-gateway-jsonl.py ~/.defenseclaw/gateway.jsonl --min-events 1
          else
            echo "gateway.jsonl not yet populated — skipping schema check"
          fi

      - name: Unit tests
        run: make test

      - name: TypeScript plugin tests
        run: make ts-test

      - name: Rego policy tests
        run: make rego-test

      - name: E2E tests
        run: bash scripts/test-e2e-full-stack.sh

      # Phase 6 observability invariants: timestamp sanity, UUID
      # request_id format, and audit.db correlation after E2E
      # traffic has been driven through the sidecar.
      - name: Observability assertions
        if: always()
        run: |
          if [ ! -f ~/.defenseclaw/gateway.jsonl ]; then
            echo "gateway.jsonl not populated — skipping observability assertions"
            exit 0
          fi
          MOCK_ARGS=()
          # Core profile runs with guardrail disabled, so there will
          # never be a defenseclaw:judge envelope — passing
          # --splunk-mock-log would hard-fail. We still start the mock
          # so the sidecar's sink health stays green, but we only feed
          # the mock log into the assertion script when we actually
          # expect judge traffic (full-live job; see below).
          if [ -s "${SPLUNK_MOCK_LOG:-}" ]; then
            echo "[assertions] splunk-mock log captured $(wc -l <"${SPLUNK_MOCK_LOG}" | tr -d ' ') envelope(s)"
          fi
          bash test/e2e/observability_assertions.sh \
              --jsonl ~/.defenseclaw/gateway.jsonl \
              --db ~/.defenseclaw/audit.db \
              --ts-window-seconds 3600 \
              --no-require-verdict \
              "${MOCK_ARGS[@]}"

      - name: Stage DefenseClaw logs for artifact upload
        if: failure()
        run: |
          set -euo pipefail
          STAGE=/tmp/defenseclaw-logs-core
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          if [ -d "$HOME/.defenseclaw" ]; then
            for pat in '*.log' '*.jsonl' 'config.yaml' 'doctor_cache.json'; do
              find "$HOME/.defenseclaw" -maxdepth 2 -type f -name "$pat" -exec cp --parents {} "$STAGE/" \; 2>/dev/null || true
            done
          fi
          cp -v /tmp/splunk-mock-core.log "$STAGE/" 2>/dev/null || true
          cp -v /tmp/splunk-mock.stdout "$STAGE/" 2>/dev/null || true
          echo '--- staged files ---'
          find "$STAGE" -type f | head -100 || true

      - name: Upload DefenseClaw logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: defenseclaw-logs-core
          path: /tmp/defenseclaw-logs-core/**
          if-no-files-found: ignore
          retention-days: 7
          include-hidden-files: true

      - name: Post-run cleanup
        if: always()
        run: |
          if [ -f "${SPLUNK_MOCK_PID_FILE:-}" ]; then
            kill -TERM "$(cat "${SPLUNK_MOCK_PID_FILE}")" 2>/dev/null || true
            rm -f "${SPLUNK_MOCK_PID_FILE}"
          fi

          cd bundles/splunk_local_bridge/compose 2>/dev/null && {
            export SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0
            docker compose -f docker-compose.ci.yml down -v 2>/dev/null || true
            cd -
          } || true

          rm -rf ~/.defenseclaw
          rm -f ~/.local/bin/defenseclaw-gateway
          rm -rf ~/.openclaw/extensions/defenseclaw*

          # Generic host-wide cleanup — see scripts/runner-cleanup.sh.
          bash scripts/runner-cleanup.sh

  full-live:
    name: Full Live E2E
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: [self-hosted, Linux, ARM64, e2e]
    timeout-minutes: 45
    env:
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      # ANTHROPIC_API_KEY intentionally NOT plumbed into this job. The full-live
      # guardrail agent now runs on OpenClaw's stock amazon-bedrock provider
      # (auth=aws-sdk, AWS_BEARER_TOKEN_BEDROCK below). Injecting a stale /
      # low-balance Anthropic key here triggers three false-positive failures:
      #   (a) the defenseclaw doctor "LLM API key" check hits api.anthropic.com
      #       because its current provider routing does a substring match on
      #       "anthropic" in the model name (see cli/defenseclaw/commands/
      #       cmd_doctor.py),
      #   (b) the Anthropic /v1/messages passthrough test gets 400 "credit
      #       balance too low",
      #   (c) the duplicate-header / X-AI-Auth tests likewise call
      #       api.anthropic.com directly.
      # Those tests all skip cleanly with "ANTHROPIC_API_KEY not set" when the
      # env var is absent, which is the correct behavior for a Bedrock-only
      # live run.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      BIFROST_API_KEY: ${{ secrets.BIFROST_API_KEY }}
      # BIFROST_API_KEY holds an AWS Bedrock bearer token (ABSK…). Expose it to
      # both our in-process Bifrost (via BIFROST_API_KEY) and to OpenClaw's
      # stock amazon-bedrock provider (via AWS_BEARER_TOKEN_BEDROCK) so OC can
      # talk to Bedrock natively through the AWS SDK default credential chain.
      # See https://docs.openclaw.ai/providers/bedrock ("auth: aws-sdk").
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.BIFROST_API_KEY }}
      AWS_REGION: us-east-1
      SPLUNK_ACCESS_TOKEN: ${{ secrets.SPLUNK_ACCESS_TOKEN }}
      SPLUNK_REALM: ${{ secrets.SPLUNK_REALM }}
      E2E_PROFILE: full-live
      DEFENSECLAW_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}-full-live
      E2E_TEST_PREFIX: e2e-gh-${{ github.run_id }}-${{ github.run_attempt }}-full-live
      E2E_REQUIRE_AGENT_INSTALL: "true"
      E2E_REQUIRE_AGENT_SCAN: "true"
      E2E_REQUIRE_GUARDRAIL: "true"
      E2E_REQUIRE_LIVE_MCP: "false"
      E2E_ENABLE_PLUGIN_LIFECYCLE: "true"
      E2E_REQUIRE_PLUGIN_LIFECYCLE: "false"
      E2E_ENABLE_RECOVERY: "true"
      E2E_REQUIRE_RECOVERY: "false"
      OPENCLAW_MODEL_PATCHED: "false"
      OPENCLAW_MODEL_BACKUP_PATH: /tmp/defenseclaw-openclaw.full-live.backup.json
      OPENCLAW_AUTH_BACKUP_PATH: /tmp/defenseclaw-openclaw.full-live.auth-profiles.backup.json
      OPENCLAW_AUTH_BACKUP_MISSING_PATH: /tmp/defenseclaw-openclaw.full-live.auth-profiles.missing
      OPENCLAW_SERVICE_ENV_PATH: /home/ubuntu/.openclaw/openclaw-service.env
      OPENCLAW_SERVICE_DROPIN_PATH: /home/ubuntu/.config/systemd/user/openclaw-gateway.service.d/defenseclaw-e2e.conf
      # Phase 6 observability mock (see core job for rationale). The
      # full-live job uses a distinct log path so it can run
      # concurrently with core on a shared self-hosted runner.
      SPLUNK_MOCK_PORT: "18088"
      SPLUNK_MOCK_LOG: /tmp/splunk-mock-full-live.log
      SPLUNK_MOCK_PID_FILE: /tmp/splunk-mock-full-live.pid
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Clean DefenseClaw
        run: |
          if [ -f "${SPLUNK_MOCK_PID_FILE}" ]; then
            kill -TERM "$(cat "${SPLUNK_MOCK_PID_FILE}")" 2>/dev/null || true
            rm -f "${SPLUNK_MOCK_PID_FILE}"
          fi
          rm -f "${SPLUNK_MOCK_LOG}"

          if [ -f "${OPENCLAW_MODEL_BACKUP_PATH}" ]; then
            mkdir -p ~/.openclaw
            cp "${OPENCLAW_MODEL_BACKUP_PATH}" ~/.openclaw/openclaw.json
            rm -f "${OPENCLAW_MODEL_BACKUP_PATH}"
          fi
          if [ -f "${OPENCLAW_AUTH_BACKUP_PATH}" ]; then
            mkdir -p ~/.openclaw/agents/main/agent
            cp "${OPENCLAW_AUTH_BACKUP_PATH}" ~/.openclaw/agents/main/agent/auth-profiles.json
            rm -f "${OPENCLAW_AUTH_BACKUP_PATH}"
          fi
          if [ -f "${OPENCLAW_AUTH_BACKUP_MISSING_PATH}" ]; then
            rm -f ~/.openclaw/agents/main/agent/auth-profiles.json
            rm -f "${OPENCLAW_AUTH_BACKUP_MISSING_PATH}"
          fi

          # Bring down any leftover Splunk compose stack BEFORE host-wide
          # reclaim so docker can release its volumes.
          cd bundles/splunk_local_bridge/compose 2>/dev/null && {
            export SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0
            docker compose -f docker-compose.ci.yml down -v 2>/dev/null || true
            cd -
          } || true

          # Generic host-wide cleanup — see scripts/runner-cleanup.sh.
          bash scripts/runner-cleanup.sh

          rm -rf ~/.defenseclaw
          rm -f ~/.local/bin/defenseclaw-gateway
          rm -rf ~/.openclaw/extensions/defenseclaw*
          rm -rf ~/.openclaw/workspace/skills/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          rm -rf ~/.openclaw/skills/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          rm -rf ~/.openclaw/extensions/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          rm -rf /tmp/"${E2E_TEST_PREFIX}"* 2>/dev/null || true
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          prefix = os.environ["E2E_TEST_PREFIX"]
          cfg_path = Path(os.path.expanduser("~/.openclaw/openclaw.json"))
          quarantine_root = Path(os.path.expanduser("~/.defenseclaw/quarantine"))
          for sub in ("skills", "plugins"):
              root = quarantine_root / sub
              if root.is_dir():
                  for child in root.iterdir():
                      if child.name.startswith(prefix):
                          shutil.rmtree(child, ignore_errors=True)

          if not cfg_path.exists():
              raise SystemExit(0)

          with cfg_path.open() as f:
              cfg = json.load(f)

          changed = False
          workspace = Path(
              cfg.get("agents", {}).get("defaults", {}).get("workspace")
              or os.path.expanduser("~/.openclaw/workspace")
          )
          global_skills = Path(os.path.expanduser("~/.openclaw/skills"))

          skills = cfg.setdefault("skills", {}).setdefault("entries", {})
          kept_skills = {
              name: meta
              for name, meta in skills.items()
              if not str(name).startswith(prefix)
              and ((workspace / "skills" / name).is_dir() or (global_skills / name).is_dir())
          }
          if kept_skills != skills:
              cfg["skills"]["entries"] = kept_skills
              changed = True

          plugins = cfg.setdefault("plugins", {})
          for section in ("entries", "installs"):
              bucket = plugins.get(section)
              if not isinstance(bucket, dict):
                  continue
              next_bucket = {
                  name: meta
                  for name, meta in bucket.items()
                  if not str(name).startswith(prefix) and str(name) != "defenseclaw"
              }
              if next_bucket != bucket:
                  plugins[section] = next_bucket
                  changed = True

          if changed:
              with cfg_path.open("w") as f:
                  json.dump(cfg, f, indent=2)
                  f.write("\n")
              print("OpenClaw config normalized for persistent E2E runner")
          else:
              print("OpenClaw config already clean")
          PY

          # Fail fast if cleanup couldn't buy back enough headroom. The
          # previous threshold of 8 GB still allowed the disk to fill mid-run
          # because Splunk's working set + go build temp dirs + checkout
          # consume ~9-10 GB at peak. Bumping to 10 GB gives us the headroom
          # to survive a worst-case run.
          FREE_GB=$(df -BG --output=avail / | tail -1 | tr -dc '0-9')
          echo "--- Final free space: ${FREE_GB}G ---"
          if [ "${FREE_GB:-0}" -lt 10 ]; then
            echo "::error::Runner disk below 10 GB free after cleanup (${FREE_GB}G)."
            echo "::error::Runner needs maintenance: install an ACTIONS_RUNNER_HOOK_JOB_STARTED"
            echo "::error::script on the host, or grow the root disk. See e2e.yml 'Clean DefenseClaw'."
            exit 1
          fi

      - name: Start Splunk
        run: |
          cd bundles/splunk_local_bridge
          bash splunk/package_local_mode_app.sh
          cd compose
          export SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for Splunk HEC..."
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8088/services/collector/health && break
            sleep 5
          done

          echo "Disk free: $(df -h / | tail -1)"
          docker compose -f docker-compose.ci.yml exec -T -u splunk splunk bash -c '
            for d in /opt/splunk/etc/system/local /opt/splunk/etc/apps/search/local; do
              echo "Checking $d/server.conf ..."
              if [ -d "$d" ]; then
                mkdir -p "$d"
                SCONF="$d/server.conf"
                if ! grep -q "minFreeSpace" "$SCONF" 2>/dev/null; then
                  printf "\n[diskUsage]\nminFreeSpace = 500\n" >> "$SCONF"
                  echo "  -> patched $SCONF"
                else
                  echo "  -> already has minFreeSpace"
                fi
                cat "$SCONF"
                break
              fi
            done
          '
          echo "Restarting Splunk to apply minFreeSpace..."
          docker compose -f docker-compose.ci.yml restart splunk
          echo "Waiting for Splunk HEC after restart..."
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8088/services/collector/health && break
            sleep 5
          done

      # Phase 6 mock HEC collector — captures envelopes to
      # $SPLUNK_MOCK_LOG so observability_assertions.sh can grep for
      # the defenseclaw:judge sourcetype end-to-end. Runs on a
      # separate port alongside the real Splunk container.
      - name: Start Splunk HEC mock
        run: |
          mkdir -p "$(dirname "${SPLUNK_MOCK_LOG}")"
          : >"${SPLUNK_MOCK_LOG}"
          nohup python3 test/e2e/splunk_hec_mock.py \
              --port "${SPLUNK_MOCK_PORT}" \
              --log "${SPLUNK_MOCK_LOG}" \
              >/tmp/splunk-mock.stdout 2>&1 &
          echo $! > "${SPLUNK_MOCK_PID_FILE}"
          for i in $(seq 1 10); do
            if curl -sf -o /dev/null -w '%{http_code}' \
                  -X POST http://127.0.0.1:${SPLUNK_MOCK_PORT}/services/collector \
                  | grep -q '401'; then
              echo "splunk-hec-mock up on :${SPLUNK_MOCK_PORT}"
              break
            fi
            sleep 0.5
          done
          ps -p "$(cat "${SPLUNK_MOCK_PID_FILE}")" -o pid,cmd || {
              echo "FAIL: splunk-hec-mock did not start"
              cat /tmp/splunk-mock.stdout || true
              exit 1
          }

      - name: Install DefenseClaw
        run: make install

      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install OPA
        run: |
          if command -v opa >/dev/null 2>&1; then
            opa version
            exit 0
          fi

          case "$(uname -m)" in
            aarch64|arm64) OPA_ARCH="arm64" ;;
            x86_64|amd64) OPA_ARCH="amd64" ;;
            *)
              echo "Unsupported architecture for OPA: $(uname -m)"
              exit 1
              ;;
          esac

          curl -fsSL \
            -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v1.14.1/opa_linux_${OPA_ARCH}_static"
          install -m 0755 /tmp/opa "$HOME/.local/bin/opa"
          opa version

      - name: Prepare OpenClaw Anthropic model + auth
        run: |
          if [ -f "${OPENCLAW_MODEL_BACKUP_PATH}" ]; then
            mkdir -p ~/.openclaw
            cp "${OPENCLAW_MODEL_BACKUP_PATH}" ~/.openclaw/openclaw.json
            rm -f "${OPENCLAW_MODEL_BACKUP_PATH}"
          fi
          if [ -f "${OPENCLAW_AUTH_BACKUP_PATH}" ]; then
            mkdir -p ~/.openclaw/agents/main/agent
            cp "${OPENCLAW_AUTH_BACKUP_PATH}" ~/.openclaw/agents/main/agent/auth-profiles.json
            rm -f "${OPENCLAW_AUTH_BACKUP_PATH}"
          fi
          if [ -f "${OPENCLAW_AUTH_BACKUP_MISSING_PATH}" ]; then
            rm -f ~/.openclaw/agents/main/agent/auth-profiles.json
            rm -f "${OPENCLAW_AUTH_BACKUP_MISSING_PATH}"
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          # Full-live CI LLM provider: AWS Bedrock via OpenClaw's stock
          # amazon-bedrock provider. We use a Claude Haiku 4.5 inference profile
          # because it's the cheapest current Anthropic model on Bedrock with
          # tool-calling support (required by block/allow enforcement tests) —
          # same model family our in-process Bifrost e2e test covers.
          # Auth is the AWS SDK default chain, which picks up
          # AWS_BEARER_TOKEN_BEDROCK from the job env (set to BIFROST_API_KEY).
          # See https://docs.openclaw.ai/providers/bedrock.
          bedrock_provider = "amazon-bedrock"
          bedrock_model_id = "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          target_model = f"{bedrock_provider}/{bedrock_model_id}"
          state_dir = Path(os.path.expanduser("~/.openclaw"))
          cfg_path = state_dir / "openclaw.json"
          auth_path = state_dir / "agents" / "main" / "agent" / "auth-profiles.json"
          if not cfg_path.exists():
              raise SystemExit("openclaw.json not found; full-live requires a configured OpenClaw home")

          backup_path = Path(os.environ["OPENCLAW_MODEL_BACKUP_PATH"])
          backup_path.write_text(cfg_path.read_text())
          auth_backup_path = Path(os.environ["OPENCLAW_AUTH_BACKUP_PATH"])
          auth_missing_path = Path(os.environ["OPENCLAW_AUTH_BACKUP_MISSING_PATH"])
          if auth_backup_path.exists():
              auth_backup_path.unlink()
          if auth_missing_path.exists():
              auth_missing_path.unlink()
          if auth_path.exists():
              auth_backup_path.write_text(auth_path.read_text())
          else:
              auth_missing_path.write_text("")

          with cfg_path.open() as f:
              cfg = json.load(f)

          # Register amazon-bedrock provider explicitly with bedrock-converse-stream
          # API + aws-sdk auth. No apiKey field — AWS SDK chain supplies creds
          # from AWS_BEARER_TOKEN_BEDROCK at request time.
          aws_region = os.environ.get("AWS_REGION", "us-east-1")
          models_cfg = cfg.setdefault("models", {})
          providers_cfg = models_cfg.setdefault("providers", {})
          providers_cfg[bedrock_provider] = {
              "baseUrl": f"https://bedrock-runtime.{aws_region}.amazonaws.com",
              "api": "bedrock-converse-stream",
              "auth": "aws-sdk",
              "models": [
                  {
                      "id": bedrock_model_id,
                      "name": "Claude Haiku 4.5 (Bedrock)",
                      "input": ["text"],
                      "contextWindow": 200000,
                      "maxTokens": 8192,
                  }
              ],
          }

          # IMPORTANT: do NOT add an amazon-bedrock entry under auth.profiles.
          # OpenClaw's config schema restricts profile mode values to
          # {"api_key", "oauth", "token"} (an earlier version of this file
          # tried mode="aws_sdk" and OpenClaw rejected the whole config at
          # startup). Per https://docs.openclaw.ai/providers/bedrock, the
          # provider entry above sets auth="aws-sdk", which tells OpenClaw to
          # resolve credentials through the AWS SDK default chain
          # (AWS_BEARER_TOKEN_BEDROCK / AWS_ACCESS_KEY_ID / AWS_PROFILE) at
          # request time — no auth profile is needed.
          #
          # Scrub any stale amazon-bedrock entries from an older run's config
          # (e.g. if the backup/restore flow somehow leaked a bad profile).
          auth_cfg = cfg.setdefault("auth", {})
          auth_profiles = auth_cfg.setdefault("profiles", {})
          auth_profiles.pop(f"{bedrock_provider}:default", None)
          auth_order = auth_cfg.setdefault("order", {})
          auth_order.pop(bedrock_provider, None)

          agents = cfg.setdefault("agents", {})
          defaults = agents.setdefault("defaults", {})
          model_cfg = defaults.get("model")
          if isinstance(model_cfg, dict):
              model_cfg["primary"] = target_model
          else:
              defaults["model"] = {"primary": target_model, "fallbacks": []}

          with cfg_path.open("w") as f:
              json.dump(cfg, f, indent=2)
              f.write("\n")

          # auth-profiles.json: empty profile store. amazon-bedrock
          # authenticates via the AWS SDK default chain driven by the
          # provider's auth="aws-sdk" setting, so we don't register a keyref
          # here. Writing an empty store (rather than leaving a stale file)
          # ensures a prior run's ANTHROPIC_API_KEY-based profile doesn't
          # bleed through.
          auth_path.parent.mkdir(parents=True, exist_ok=True)
          auth_store = {
              "version": 1,
              "profiles": {},
              "order": {},
          }
          with auth_path.open("w") as f:
              json.dump(auth_store, f, indent=2)
              f.write("\n")
          auth_path.chmod(0o600)
          PY
          USER_RUNTIME_DIR="/run/user/$(id -u)"
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-$USER_RUNTIME_DIR}"
          export DBUS_SESSION_BUS_ADDRESS="${DBUS_SESSION_BUS_ADDRESS:-unix:path=${XDG_RUNTIME_DIR}/bus}"
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS}" >> "$GITHUB_ENV"
          mkdir -p "$(dirname "${OPENCLAW_SERVICE_DROPIN_PATH}")"
          python3 - <<'PY'
          import os
          from pathlib import Path

          env_path = Path(os.environ["OPENCLAW_SERVICE_ENV_PATH"])
          dropin_path = Path(os.environ["OPENCLAW_SERVICE_DROPIN_PATH"])
          env_path.parent.mkdir(parents=True, exist_ok=True)
          lines = []
          # AWS_BEARER_TOKEN_BEDROCK + AWS_REGION are required by OpenClaw's
          # amazon-bedrock provider (AWS SDK default chain). BIFROST_API_KEY is
          # kept for our in-process Bifrost callers. Both point at the same
          # ABSK… token held in the BIFROST_API_KEY secret.
          for key in (
              "ANTHROPIC_API_KEY",
              "OPENAI_API_KEY",
              "OPENCLAW_GATEWAY_TOKEN",
              "AWS_BEARER_TOKEN_BEDROCK",
              "AWS_REGION",
              "BIFROST_API_KEY",
          ):
              value = os.environ.get(key, "")
              if value:
                  lines.append(f"{key}={value}")
          env_path.write_text("\n".join(lines) + ("\n" if lines else ""))
          env_path.chmod(0o600)
          dropin_path.write_text("[Service]\nEnvironmentFile=%h/.openclaw/openclaw-service.env\n")
          PY
          systemctl --user daemon-reload

          echo "OPENCLAW_MODEL_PATCHED=true" >> "$GITHUB_ENV"
          # Set a provisional guardrail target. The Init DefenseClaw step
          # overwrites this with the actual OC_MODEL it discovers from
          # openclaw.json, so this value is just a safe default if that step
          # somehow fails to read the freshly-patched config.
          echo "GUARDRAIL_REQUEST_MODEL=amazon-bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0" >> "$GITHUB_ENV"

      - name: Init DefenseClaw
        run: |
          defenseclaw init

          echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}" >> ~/.defenseclaw/.env
          echo "DEFENSECLAW_RUN_ID=${DEFENSECLAW_RUN_ID}" >> ~/.defenseclaw/.env
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${GOOGLE_API_KEY:-}" ]; then
            echo "GOOGLE_API_KEY=${GOOGLE_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${AZURE_OPENAI_API_KEY:-}" ]; then
            echo "AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}" >> ~/.defenseclaw/.env
          fi
          # BIFROST_API_KEY = AWS Bedrock bearer token (ABSK…). Consumed by the
          # guardrail sidecar via api_key_env=BIFROST_API_KEY (set in the
          # guardrail config step below) and by our in-process Bifrost SDK.
          # AWS_BEARER_TOKEN_BEDROCK + AWS_REGION feed OpenClaw's stock
          # amazon-bedrock provider (AWS SDK default chain).
          if [ -n "${BIFROST_API_KEY:-}" ]; then
            echo "BIFROST_API_KEY=${BIFROST_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${AWS_BEARER_TOKEN_BEDROCK:-}" ]; then
            echo "AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${AWS_REGION:-}" ]; then
            echo "AWS_REGION=${AWS_REGION}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${SPLUNK_ACCESS_TOKEN:-}" ]; then
            echo "SPLUNK_ACCESS_TOKEN=${SPLUNK_ACCESS_TOKEN}" >> ~/.defenseclaw/.env
            echo "SPLUNK_REALM=${SPLUNK_REALM}" >> ~/.defenseclaw/.env
          fi

          defenseclaw setup skill-scanner \
            --use-behavioral \
            --policy balanced \
            --non-interactive \
            --no-verify

          defenseclaw setup mcp-scanner \
            --analyzers yara \
            --scan-instructions \
            --non-interactive

          OC_MODEL=$(python3 -c "
          import json, os
          try:
              with open(os.path.expanduser('~/.openclaw/openclaw.json')) as f:
                  cfg = json.load(f)
              print(cfg.get('agents',{}).get('defaults',{}).get('model',{}).get('primary',''))
          except Exception:
              print('')
          ")

          MODEL_NAME=""
          API_KEY_ENV=""
          GUARDRAIL_ENABLED=false
          GUARDRAIL_REASON="no compatible live provider detected"

          if [ -n "$OC_MODEL" ]; then
            MODEL_NAME=$(echo "$OC_MODEL" | sed 's|.*/||')
            # Bedrock must be matched BEFORE the generic anthropic/claude pattern
            # because a Bedrock inference profile id looks like
            # "amazon-bedrock/us.anthropic.claude-haiku-4-5-...".
            if echo "$OC_MODEL" | grep -qi "^\(amazon-\)\?bedrock/\|bedrock\|/us\.anthropic\.\|/amazon\.\|/nova"; then
              # Our embedded Bifrost Go SDK accepts an AWS Bedrock bearer token
              # (ABSK…) directly as BIFROST_API_KEY. No SigV4 signing required.
              API_KEY_ENV="BIFROST_API_KEY"
            elif echo "$OC_MODEL" | grep -qi "anthropic\|claude\|sonnet\|haiku\|opus"; then
              API_KEY_ENV="ANTHROPIC_API_KEY"
            elif echo "$OC_MODEL" | grep -qi "openai\|gpt\|o1\|o3\|o4"; then
              API_KEY_ENV="OPENAI_API_KEY"
            elif echo "$OC_MODEL" | grep -qi "gemini\|google"; then
              API_KEY_ENV="GOOGLE_API_KEY"
            else
              GUARDRAIL_REASON="model provider is not supported by the live guardrail proxy"
            fi

            if [ -n "$API_KEY_ENV" ] && [ -n "${!API_KEY_ENV:-}" ]; then
              GUARDRAIL_ENABLED=true
              GUARDRAIL_REASON=""
            elif [ -n "$API_KEY_ENV" ]; then
              GUARDRAIL_REASON="missing ${API_KEY_ENV} secret for live guardrail proxy"
            fi
          else
            GUARDRAIL_REASON="no model found in openclaw.json"
          fi

          echo "GUARDRAIL_REQUEST_MODEL=${OC_MODEL}" >> "$GITHUB_ENV"
          if [ -n "${GUARDRAIL_REASON:-}" ]; then
            echo "Guardrail live check status: ${GUARDRAIL_REASON}"
          fi

          echo "DEFENSECLAW_SPLUNK_HEC_TOKEN=00000000-0000-0000-0000-000000000001" >> ~/.defenseclaw/.env
          export OC_MODEL MODEL_NAME API_KEY_ENV GUARDRAIL_ENABLED GUARDRAIL_REASON
          python3 - <<'PY'
          import os
          import yaml

          cfg_path = os.path.expanduser('~/.defenseclaw/config.yaml')
          with open(cfg_path) as f:
              cfg = yaml.safe_load(f) or {}

          # v4 config schema: legacy `splunk:` block is rejected at startup.
          # Point the local Splunk container (brought up by the "Start
          # Splunk" step above) at the new generic sinks framework.
          cfg.pop('splunk', None)
          mock_port = os.environ.get('SPLUNK_MOCK_PORT', '18088')
          cfg['audit_sinks'] = [
              {
                  'name':    'splunk-local',
                  'kind':    'splunk_hec',
                  'enabled': True,
                  'splunk_hec': {
                      'endpoint':   'http://127.0.0.1:8088/services/collector/event',
                      'token_env':  'DEFENSECLAW_SPLUNK_HEC_TOKEN',
                      'index':      'defenseclaw_local',
                      'source':     'defenseclaw',
                      'sourcetype': 'defenseclaw:json',
                      'verify_tls': False,
                  },
              },
              # Phase 6 mock HEC collector (see core job for rationale).
              {
                  'name':    'splunk-mock',
                  'kind':    'splunk_hec',
                  'enabled': True,
                  'splunk_hec': {
                      'endpoint':   f'http://127.0.0.1:{mock_port}/services/collector/event',
                      'token_env':  'DEFENSECLAW_SPLUNK_HEC_TOKEN',
                      'index':      'defenseclaw_mock',
                      'source':     'defenseclaw-mock',
                      'sourcetype': 'defenseclaw:json',
                      'verify_tls': False,
                  },
              },
          ]

          cfg.setdefault('guardrail', {})
          cfg['guardrail']['enabled'] = False
          cfg['guardrail']['mode'] = 'observe'

          if os.environ.get('GUARDRAIL_ENABLED', '').lower() == 'true':
              cfg['guardrail']['enabled'] = True
              cfg['guardrail']['mode'] = 'action'
              cfg['guardrail']['model'] = os.environ.get('OC_MODEL', '')
              cfg['guardrail']['model_name'] = os.environ.get('MODEL_NAME', '')
              cfg['guardrail']['api_key_env'] = os.environ.get('API_KEY_ENV', '')
              cfg['guardrail']['detection_strategy'] = 'regex_judge'
              cfg['guardrail']['detection_strategy_completion'] = 'regex_only'
              cfg['guardrail'].setdefault('judge', {})
              cfg['guardrail']['judge']['enabled'] = True
              cfg['guardrail']['judge']['injection'] = True
              cfg['guardrail']['judge']['pii'] = True
              cfg['guardrail']['judge']['pii_prompt'] = True
              cfg['guardrail']['judge']['pii_completion'] = True
              cfg['guardrail']['judge']['tool_injection'] = True
              cfg['guardrail']['judge']['model'] = os.environ.get('JUDGE_MODEL', os.environ.get('OC_MODEL', ''))
              cfg['guardrail']['judge']['api_key_env'] = os.environ.get('JUDGE_API_KEY_ENV', os.environ.get('API_KEY_ENV', ''))
              cfg['guardrail']['judge']['api_base'] = os.environ.get('JUDGE_API_BASE', '')
              cfg['guardrail']['judge']['timeout'] = 30
              # Shared LLM key — scanners and judge can fall back to this
              shared_key_env = os.environ.get('DEFAULT_LLM_API_KEY_ENV', os.environ.get('API_KEY_ENV', ''))
              if shared_key_env:
                  cfg['default_llm_api_key_env'] = shared_key_env
              cfg['skill_actions'] = {
                  'critical': {'file': 'quarantine', 'runtime': 'disable', 'install': 'block'},
                  'high':     {'file': 'quarantine', 'runtime': 'disable', 'install': 'block'},
                  'medium':   {'file': 'none',       'runtime': 'enable',  'install': 'none'},
                  'low':      {'file': 'none',       'runtime': 'enable',  'install': 'none'},
              }

          with open(cfg_path, 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          PY

          defenseclaw-gateway restart || defenseclaw-gateway start
          # Wait up to 30s for the sidecar to become healthy rather than a
          # fixed 5s sleep (self-hosted runners can be slow under load).
          for i in $(seq 1 30); do
            if defenseclaw-gateway status >/dev/null 2>&1; then
              echo "sidecar healthy after ${i}s"
              break
            fi
            sleep 1
          done
          defenseclaw-gateway status || {
            echo "--- gateway.log (tail) ---"
            tail -n 200 ~/.defenseclaw/gateway.log 2>/dev/null || true
            echo "--- gateway.jsonl (tail) ---"
            tail -n 200 ~/.defenseclaw/gateway.jsonl 2>/dev/null || true
            echo "--- watchdog.log (tail) ---"
            tail -n 200 ~/.defenseclaw/watchdog.log 2>/dev/null || true
            exit 1
          }

      - name: Validate gateway.jsonl schema
        run: |
          if [ -f ~/.defenseclaw/gateway.jsonl ]; then
            python3 scripts/assert-gateway-jsonl.py ~/.defenseclaw/gateway.jsonl --min-events 1
          else
            echo "gateway.jsonl not yet populated — skipping schema check"
          fi

      - name: Unit tests
        run: make test

      - name: TypeScript plugin tests
        run: make ts-test

      - name: Rego policy tests
        run: make rego-test

      - name: E2E tests
        run: bash scripts/test-e2e-full-stack.sh

      # Phase 6 observability invariants: timestamp sanity, UUID
      # request_id format, and audit.db correlation after E2E
      # traffic has been driven through the sidecar.
      - name: Observability assertions
        if: always()
        run: |
          if [ ! -f ~/.defenseclaw/gateway.jsonl ]; then
            echo "gateway.jsonl not populated — skipping observability assertions"
            exit 0
          fi
          MOCK_ARGS=()
          # Full-live only expects a defenseclaw:judge envelope when
          # the live guardrail was actually enabled — otherwise the
          # judge never fires and grep would fail. The "Init
          # DefenseClaw" step above wrote the resolved guardrail state
          # into the generated config, so we read it back here.
          GUARDRAIL_ENABLED=$(python3 -c '
          import yaml, os
          try:
              with open(os.path.expanduser("~/.defenseclaw/config.yaml")) as f:
                  cfg = yaml.safe_load(f) or {}
              print(str(cfg.get("guardrail", {}).get("enabled", False)).lower())
          except Exception:
              print("false")
          ')
          if [ -s "${SPLUNK_MOCK_LOG:-}" ]; then
            echo "[assertions] splunk-mock log captured $(wc -l <"${SPLUNK_MOCK_LOG}" | tr -d ' ') envelope(s)"
          fi
          if [ "$GUARDRAIL_ENABLED" = "true" ] && [ -f "${SPLUNK_MOCK_LOG:-}" ]; then
              MOCK_ARGS+=(--splunk-mock-log "${SPLUNK_MOCK_LOG}")
          else
              echo "[assertions] guardrail_enabled=${GUARDRAIL_ENABLED} — skipping splunk-mock sourcetype assertion"
          fi
          bash test/e2e/observability_assertions.sh \
              --jsonl ~/.defenseclaw/gateway.jsonl \
              --db ~/.defenseclaw/audit.db \
              --ts-window-seconds 3600 \
              --no-require-verdict \
              "${MOCK_ARGS[@]}"

      - name: Stage DefenseClaw logs for artifact upload
        if: failure()
        run: |
          set -euo pipefail
          STAGE=/tmp/defenseclaw-logs-full-live
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          if [ -d "$HOME/.defenseclaw" ]; then
            for pat in '*.log' '*.jsonl' 'config.yaml' 'doctor_cache.json'; do
              find "$HOME/.defenseclaw" -maxdepth 2 -type f -name "$pat" -exec cp --parents {} "$STAGE/" \; 2>/dev/null || true
            done
          fi
          cp -v /tmp/splunk-mock-full-live.log "$STAGE/" 2>/dev/null || true
          cp -v /tmp/splunk-mock.stdout "$STAGE/" 2>/dev/null || true
          echo '--- staged files ---'
          find "$STAGE" -type f | head -100 || true

      - name: Upload DefenseClaw logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: defenseclaw-logs-full-live
          path: /tmp/defenseclaw-logs-full-live/**
          if-no-files-found: ignore
          retention-days: 7
          include-hidden-files: true

      - name: Restore OpenClaw Anthropic model
        if: always()
        run: |
          rm -f "${OPENCLAW_SERVICE_ENV_PATH}" "${OPENCLAW_SERVICE_DROPIN_PATH}"
          systemctl --user daemon-reload || true
          if [ -f "${OPENCLAW_MODEL_BACKUP_PATH}" ]; then
            mkdir -p ~/.openclaw
            cp "${OPENCLAW_MODEL_BACKUP_PATH}" ~/.openclaw/openclaw.json
            rm -f "${OPENCLAW_MODEL_BACKUP_PATH}"
          fi
          if [ -f "${OPENCLAW_AUTH_BACKUP_PATH}" ]; then
            mkdir -p ~/.openclaw/agents/main/agent
            cp "${OPENCLAW_AUTH_BACKUP_PATH}" ~/.openclaw/agents/main/agent/auth-profiles.json
            rm -f "${OPENCLAW_AUTH_BACKUP_PATH}"
          fi
          if [ -f "${OPENCLAW_AUTH_BACKUP_MISSING_PATH}" ]; then
            rm -f ~/.openclaw/agents/main/agent/auth-profiles.json
            rm -f "${OPENCLAW_AUTH_BACKUP_MISSING_PATH}"
          fi

      - name: Post-run cleanup
        if: always()
        run: |
          if [ -f "${SPLUNK_MOCK_PID_FILE:-}" ]; then
            kill -TERM "$(cat "${SPLUNK_MOCK_PID_FILE}")" 2>/dev/null || true
            rm -f "${SPLUNK_MOCK_PID_FILE}"
          fi

          cd bundles/splunk_local_bridge/compose 2>/dev/null && {
            export SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0
            docker compose -f docker-compose.ci.yml down -v 2>/dev/null || true
            cd -
          } || true

          rm -rf ~/.defenseclaw
          rm -f ~/.local/bin/defenseclaw-gateway
          rm -rf ~/.openclaw/extensions/defenseclaw*

          # Generic host-wide cleanup — see scripts/runner-cleanup.sh.
          bash scripts/runner-cleanup.sh

  e2e-required:
    name: E2E Required
    if: ${{ always() && github.event_name != 'schedule' }}
    needs: [core, full-live]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required E2E checks
        env:
          CORE_RESULT: ${{ needs.core.result }}
          FULL_LIVE_RESULT: ${{ needs.full-live.result }}
          EVENT_NAME: ${{ github.event_name }}
          SAME_REPO_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          echo "core=$CORE_RESULT"
          echo "full_live=$FULL_LIVE_RESULT"
          echo "event=$EVENT_NAME"
          echo "same_repo_pr=$SAME_REPO_PR"

          if [ "$CORE_RESULT" != "success" ]; then
            echo "Core E2E must succeed."
            exit 1
          fi

          if [ "$SAME_REPO_PR" = "true" ]; then
            if [ "$FULL_LIVE_RESULT" != "success" ]; then
              echo "Full Live E2E must succeed for same-repo pull requests."
              exit 1
            fi
            exit 0
          fi

          case "$FULL_LIVE_RESULT" in
            success|skipped)
              ;;
            *)
              echo "Full Live E2E must either succeed or be skipped for this event."
              exit 1
              ;;
          esac
