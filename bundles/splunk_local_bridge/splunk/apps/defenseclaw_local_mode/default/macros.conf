[openclaw_high_cost_or_slow_run_alert]
definition = index=defenseclaw_local sourcetype="otel:metric" | spath | eval run_id=if(isnull(run_id) OR run_id="", "(unknown)", run_id), session_id=if(isnull(session_id) OR session_id="", "(unknown)", session_id), session_key=if(isnull(session_key) OR session_key="", "(unknown)", session_key), provider=if(isnull(provider) OR provider="", "(unknown)", provider), model=if(isnull(model) OR model="", "(unknown)", model), metric_name=coalesce(metric_name, name, "(missing)"), alert_reason=case(metric_name="openclaw.cost.usd" AND match(metric_value, "^(?:[1-9][0-9]*)(\\.[0-9]+)?$"), "high_cost", metric_name="openclaw.run.duration_ms" AND match(metric_value, "^(?:[5-9][0-9]{3}|[1-9][0-9]{4,})(\\.[0-9]+)?$"), "slow_run", 1=1, ""), cost_value=if(metric_name="openclaw.cost.usd", metric_value, null()), run_duration_value=if(metric_name="openclaw.run.duration_ms", metric_value, null()) | where len(alert_reason)>0 | stats values(provider) as providers values(model) as models values(alert_reason) as alert_reasons values(cost_value) as cost_values values(run_duration_value) as duration_values by run_id session_id session_key | eval cost_usd=mvindex(cost_values, 0), run_duration_ms=mvindex(duration_values, 0) | fields - cost_values duration_values | sort - cost_usd - run_duration_ms
