[defenseclaw_signal_scope]
definition = index=defenseclaw_local source=defenseclaw sourcetype="defenseclaw:json"
iseval = 0

[defenseclaw_common_fields]
definition = spath | eval timestamp=coalesce(timestamp, strftime(_time, "%Y-%m-%dT%H:%M:%SZ")), source=coalesce(source, "defenseclaw"), run_id=if(isnull(run_id) OR run_id="", "(unknown)", run_id), session_id=if(isnull(session_id) OR session_id="", "(unknown)", session_id), component=if(isnull(component) OR component="", "(unknown)", component), channel=if(isnull(channel) OR channel="", "(unknown)", channel), provider=if(isnull(provider) OR provider="", "(unknown)", provider), model=if(isnull(model) OR model="", "(unknown)", model)
iseval = 0

[defenseclaw_audit_base]
definition = `defenseclaw_signal_scope` | `defenseclaw_common_fields` | eval signal_family="audit", action=coalesce(action, "(missing)"), severity=coalesce(severity, "UNKNOWN"), actor=if(isnull(actor) OR actor="", "(unknown)", actor), target=if(isnull(target) OR target="", "(none)", target), details=coalesce(details, "")
iseval = 0

[defenseclaw_audit_risk]
definition = `defenseclaw_audit_base` | eval risk_bucket=case(severity="CRITICAL", "critical", severity="ERROR", "high", severity="WARN", "medium", match(action, "(?i)block|deny|quarantine|enforce|watch"), "high", match(action, "(?i)fail|error|panic|timeout"), "high", 1=1, "normal")
iseval = 0

[defenseclaw_run_session_base]
definition = `defenseclaw_audit_base` | eval investigation_key=if(run_id!="(unknown)", run_id, session_id)
iseval = 0

[defenseclaw_notable_audit]
definition = `defenseclaw_audit_risk` | search risk_bucket="critical" OR risk_bucket="high" OR risk_bucket="medium"
iseval = 0

[defenseclaw_control_actions]
definition = `defenseclaw_audit_base` | search action="*deny*" OR action="*block*" OR action="*quarantine*" OR action="*enforce*"
iseval = 0

[defenseclaw_run_inventory]
definition = `defenseclaw_run_session_base` | stats count earliest(timestamp) as first_seen latest(timestamp) as last_seen values(action) as actions values(severity) as severities values(actor) as actors values(target) as targets by run_id session_id | sort - count
iseval = 0

[defenseclaw_repeated_deny_activity]
definition = `defenseclaw_control_actions` | search action="*deny*" OR action="*block*" | stats count as deny_count values(action) as actions values(severity) as severities values(actor) as actors values(target) as targets values(details) as details by run_id session_id | where deny_count>=2 | sort - deny_count
iseval = 0

[defenseclaw_enforcement_action_detected]
definition = `defenseclaw_control_actions` | search action="*enforce*" OR action="*quarantine*" | table timestamp run_id session_id action severity actor target details | sort - timestamp
iseval = 0

[defenseclaw_high_severity_burst]
definition = `defenseclaw_audit_base` | search severity="ERROR" OR severity="CRITICAL" | stats count as high_severity_count values(action) as actions values(actor) as actors values(target) as targets values(details) as details by run_id session_id | where high_severity_count>=2 | sort - high_severity_count
iseval = 0

[openclaw_gateway_logs_base]
definition = index=defenseclaw_local sourcetype="openclaw:gateway:json" | spath | eval signal_family="gateway_log", timestamp=coalesce(timestamp, strftime(_time, "%Y-%m-%dT%H:%M:%SZ")), source=coalesce(source, "(unknown)"), level=coalesce(level, severity, "UNKNOWN"), subsystem=coalesce(subsystem, component, "(unknown)"), message=coalesce(message, details, ""), component=if(isnull(component) OR component="", subsystem, component), run_id=if(isnull(run_id) OR run_id="", "(unknown)", run_id), session_id=if(isnull(session_id) OR session_id="", "(unknown)", session_id), status=if(isnull(status) OR status="", "(unknown)", status), request_id=if(isnull(request_id) OR request_id="", "(unknown)", request_id), error_code=if(isnull(error_code) OR error_code="", "(none)", error_code)
iseval = 0

[openclaw_gateway_errors]
definition = `openclaw_gateway_logs_base` | search level="ERROR" OR level="CRITICAL"
iseval = 0

[openclaw_gateway_runtime_symptoms]
definition = `openclaw_gateway_logs_base` | search level="ERROR" OR level="CRITICAL" OR match(message, "(?i)timeout|unhealthy|failed|panic|restart|stuck")
iseval = 0

[openclaw_gateway_error_signatures]
definition = `openclaw_gateway_errors` | eval error_signature=coalesce(error_code, message)
iseval = 0

[openclaw_repeated_gateway_error_signature]
definition = `openclaw_gateway_error_signatures` | stats count as signature_count values(message) as messages values(run_id) as run_ids values(session_id) as session_ids by subsystem error_signature | where signature_count>=2 | sort - signature_count
iseval = 0

[openclaw_diagnostics_base]
definition = index=defenseclaw_local sourcetype="openclaw:diagnostics:json" | spath | eval signal_family="diagnostic", timestamp=coalesce(timestamp, strftime(_time, "%Y-%m-%dT%H:%M:%SZ")), source=coalesce(source, "(unknown)"), event_name=coalesce(event_name, name, "(missing)"), channel=if(isnull(channel) OR channel="", "(unknown)", channel), provider=if(isnull(provider) OR provider="", "(unknown)", provider), model=if(isnull(model) OR model="", "(unknown)", model), session_id=if(isnull(session_id) OR session_id="", "(unknown)", session_id), session_key=if(isnull(session_key) OR session_key="", "(unknown)", session_key), run_id=if(isnull(run_id) OR run_id="", "(unknown)", run_id), reason=coalesce(reason, "(none)"), outcome=coalesce(outcome, "(unknown)"), lane=coalesce(lane, "(unknown)"), wait_ms=coalesce(wait_ms, 0), queue_depth=coalesce(queue_depth, 0), duration_ms=coalesce(duration_ms, 0), attempt=coalesce(attempt, 0), component=if(isnull(component) OR component="", "(unknown)", component), status=if(isnull(status) OR status="", "(unknown)", status)
iseval = 0

[openclaw_diagnostics_recent]
definition = `openclaw_diagnostics_base` | table timestamp event_name lane session_id session_key run_id outcome reason wait_ms queue_depth duration_ms attempt
iseval = 0

[openclaw_queue_lane_events]
definition = `openclaw_diagnostics_base` | search event_name="queue.lane.enqueue" OR event_name="queue.lane.dequeue"
iseval = 0

[openclaw_stuck_sessions]
definition = `openclaw_diagnostics_base` | search event_name="session.stuck"
iseval = 0

[openclaw_run_attempt_events]
definition = `openclaw_diagnostics_base` | search event_name="run.attempt"
iseval = 0

[openclaw_message_processed_events]
definition = `openclaw_diagnostics_base` | search event_name="message.processed"
iseval = 0

[openclaw_message_processing_failures]
definition = `openclaw_message_processed_events` | search outcome!="success"
iseval = 0

[openclaw_session_state_events]
definition = `openclaw_diagnostics_base` | search event_name="session.state"
iseval = 0

[openclaw_diagnostics_session_inventory]
definition = `openclaw_diagnostics_base` | stats count values(event_name) as event_names values(outcome) as outcomes values(lane) as lanes values(reason) as reasons by run_id session_id session_key | sort - count
iseval = 0

[openclaw_retry_or_stuck_sessions]
definition = `openclaw_run_attempt_events` | search attempt>=3 | eval alert_reason="retry_storm", threshold_value=attempt | fields run_id session_id session_key alert_reason threshold_value reason outcome duration_ms | append [ search `openclaw_stuck_sessions` | eval alert_reason="session_stuck", threshold_value=wait_ms | fields run_id session_id session_key alert_reason threshold_value reason outcome wait_ms ] | stats count as match_count values(alert_reason) as alert_reasons max(threshold_value) as max_threshold_value values(reason) as reasons by run_id session_id session_key | where match_count>=1 | sort - match_count - max_threshold_value
iseval = 0

[openclaw_metrics_base]
definition = index=defenseclaw_local sourcetype="otel:metric" | spath | eval signal_family="metric", timestamp=coalesce(timestamp, strftime(_time, "%Y-%m-%dT%H:%M:%SZ")), source=coalesce(source, "(unknown)"), metric_name=coalesce(metric_name, name, "(missing)"), metric_value_raw=coalesce(mvindex(mvdedup(metric_value), 0), mvindex(mvdedup(value), 0), "0"), metric_value=metric_value_raw+0, unit=if(isnull(unit) OR unit="", "(unknown)", unit), provider=if(isnull(provider) OR provider="", "(unknown)", provider), model=if(isnull(model) OR model="", "(unknown)", model), run_id=if(isnull(run_id) OR run_id="", "(unknown)", run_id), session_id=if(isnull(session_id) OR session_id="", "(unknown)", session_id), session_key=if(isnull(session_key) OR session_key="", "(unknown)", session_key), channel=if(isnull(channel) OR channel="", "(unknown)", channel), component=if(isnull(component) OR component="", "(unknown)", component), status=if(isnull(status) OR status="", "(unknown)", status), queue_depth_raw=coalesce(mvindex(mvdedup(queue_depth), 0), "0"), wait_ms_raw=coalesce(mvindex(mvdedup(wait_ms), 0), "0"), queue_depth=queue_depth_raw+0, wait_ms=wait_ms_raw+0 | fields - metric_value_raw queue_depth_raw wait_ms_raw
iseval = 0

[openclaw_cost_metrics]
definition = `openclaw_metrics_base` | search metric_name="openclaw.cost.usd"
iseval = 0

[openclaw_duration_metrics]
definition = `openclaw_metrics_base` | search metric_name="openclaw.run.duration_ms" OR metric_name="openclaw.queue.wait_ms"
iseval = 0

[openclaw_queue_pressure_metrics]
definition = `openclaw_metrics_base` | search metric_name="openclaw.queue.depth" OR metric_name="openclaw.queue.wait_ms" OR metric_name="openclaw.session.stuck"
iseval = 0

[openclaw_high_cost_or_slow_runs]
definition = index=defenseclaw_local sourcetype="otel:metric" | spath | eval run_id=if(isnull(run_id) OR run_id="", "(unknown)", run_id), session_id=if(isnull(session_id) OR session_id="", "(unknown)", session_id), session_key=if(isnull(session_key) OR session_key="", "(unknown)", session_key), provider=if(isnull(provider) OR provider="", "(unknown)", provider), model=if(isnull(model) OR model="", "(unknown)", model), metric_name=coalesce(metric_name, name, "(missing)"), alert_reason=case(metric_name="openclaw.cost.usd" AND match(metric_value, "^(?:[1-9][0-9]*)(\\.[0-9]+)?$"), "high_cost", metric_name="openclaw.run.duration_ms" AND match(metric_value, "^(?:[5-9][0-9]{3}|[1-9][0-9]{4,})(\\.[0-9]+)?$"), "slow_run", metric_name="openclaw.queue.wait_ms" AND match(metric_value, "^(?:100|[1-9][0-9]{2,})(\\.[0-9]+)?$"), "queue_pressure", 1=1, ""), cost_value=if(metric_name="openclaw.cost.usd", metric_value, null()), run_duration_value=if(metric_name="openclaw.run.duration_ms", metric_value, null()), queue_wait_value=if(metric_name="openclaw.queue.wait_ms", metric_value, null()) | where len(alert_reason)>0 | stats values(provider) as providers values(model) as models values(alert_reason) as alert_reasons values(cost_value) as cost_values values(run_duration_value) as duration_values values(queue_wait_value) as queue_wait_values by run_id session_id session_key | eval cost_usd=mvindex(cost_values, 0), run_duration_ms=mvindex(duration_values, 0), queue_wait_ms=mvindex(queue_wait_values, 0) | fields - cost_values duration_values queue_wait_values | sort - cost_usd - run_duration_ms - queue_wait_ms
