ins values(event_type) as event_types values(action) as actions values(status) as statuses values(severity) as severities values(actor) as actors values(target) as targets values(message) as messages values(details) as evidence_details sum(deny_like) as deny_count sum(dangerous_deny_evidence) as dangerous_deny_count sum(runtime_error_signal) as runtime_error_count sum(queue_pressure_signal) as queue_pressure_count sum(session_retried_signal) as session_retried_count sum(session_stuck_signal) as session_stuck_count max(usage_cost_value) as max_cost_usd max(usage_duration_value) as max_duration_ms by run_id session_id session_key | eval retry_after_deny_count=if(deny_count>=1, session_retried_count + queue_pressure_count, 0), risk_rule_ids=mvappend(if(event_count>0, "RISK-001", null()), if(deny_count>=1, "RISK-002", null()), if(runtime_error_count>=1, "RISK-003", null()), if(queue_pressure_count>=1, "RISK-004", null()), if(deny_count>=2, "RISK-005", null()), if(dangerous_deny_count>=1, "RISK-006", null()), if(session_stuck_count>=1 OR session_retried_count>=2, "RISK-007", null()), if(max_cost_usd>=1 OR max_duration_ms>=5000, "RISK-008", null()), if((deny_count>=2 OR dangerous_deny_count>=1 OR session_stuck_count>=1 OR session_retried_count>=2 OR max_cost_usd>=1 OR max_duration_ms>=5000) AND runtime_error_count>=2, "RISK-009", null()), if(deny_count>=1 AND retry_after_deny_count>=1, "RISK-010", null())) | eval risk_state=case(mvfind(risk_rule_ids, "RISK-009")>=0 OR mvfind(risk_rule_ids, "RISK-010")>=0, "critical", mvfind(risk_rule_ids, "RISK-005")>=0 OR mvfind(risk_rule_ids, "RISK-006")>=0 OR mvfind(risk_rule_ids, "RISK-007")>=0 OR mvfind(risk_rule_ids, "RISK-008")>=0, "risky", mvfind(risk_rule_ids, "RISK-002")>=0 OR mvfind(risk_rule_ids, "RISK-003")>=0 OR mvfind(risk_rule_ids, "RISK-004")>=0, "needs_review", mvfind(risk_rule_ids, "RISK-001")>=0, "observed", 1=1, "normal"), risk_reason=case(mvfind(risk_rule_ids, "RISK-010")>=0, "policy-bypass-or-retry-after-denial", mv