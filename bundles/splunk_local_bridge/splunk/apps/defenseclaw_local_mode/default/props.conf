# Field extraction for DefenseClaw audit events sent via HEC.
# Events arrive as JSON objects; KV_MODE=json ensures Splunk
# auto-extracts top-level fields (action, target, run_id, severity, …)
# at search time so standard field=value filters work.

[defenseclaw:json]
KV_MODE = json
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 0
