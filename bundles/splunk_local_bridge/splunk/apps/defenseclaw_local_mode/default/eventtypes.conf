[defenseclaw_audit]
search = index=defenseclaw_local source=defenseclaw sourcetype="defenseclaw:json"
priority = 100

[defenseclaw_notable_audit]
search = index=defenseclaw_local source=defenseclaw sourcetype="defenseclaw:json" (severity=CRITICAL OR severity=ERROR OR severity=WARN OR action="*deny*" OR action="*block*" OR action="*quarantine*" OR action="*enforce*")
priority = 100

[openclaw_gateway_log]
search = index=defenseclaw_local sourcetype="openclaw:gateway:json"
priority = 50

[openclaw_diagnostic]
search = index=defenseclaw_local sourcetype="openclaw:diagnostics:json"
priority = 50

[openclaw_metric]
search = index=defenseclaw_local metric_name="openclaw.*"
priority = 50

[openclaw_trace]
search = index=defenseclaw_local sourcetype="otel:trace"
priority = 50

[dcso_policy_event]
search = index=defenseclaw_local source=defenseclaw sourcetype="defenseclaw:json"
priority = 40

[dcso_runtime_event]
search = index=defenseclaw_local sourcetype="openclaw:gateway:json"
priority = 40

[dcso_operations_event]
search = index=defenseclaw_local sourcetype="openclaw:diagnostics:json"
priority = 40

[dcso_usage_event]
search = index=defenseclaw_local sourcetype="otel:metric"
priority = 40

[dcso_trace_event]
search = index=defenseclaw_local sourcetype="otel:trace"
priority = 40
