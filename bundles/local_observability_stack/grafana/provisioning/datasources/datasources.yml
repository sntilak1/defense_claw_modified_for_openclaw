apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: defenseclaw-prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: defenseclaw-tempo

  - name: Loki
    type: loki
    access: proxy
    uid: defenseclaw-loki
    url: http://loki:3100
    jsonData:
      derivedFields:
        - datasourceUid: defenseclaw-tempo
          matcherRegex: "trace_id=([a-f0-9]+)"
          name: trace_id
          url: "$${__value.raw}"

  # Read Prometheus' embedded alert endpoint as if it were Alertmanager so
  # Grafana's "Alerting → Alert rules" view (and the alertlist panel)
  # surface the rules defined in prometheus/rules/alerts.yml.
  - name: Prometheus-Alerts
    type: alertmanager
    access: proxy
    uid: defenseclaw-prometheus-alerts
    url: http://prometheus:9090
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false

  - name: Tempo
    type: tempo
    access: proxy
    uid: defenseclaw-tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: defenseclaw-loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: defenseclaw-prometheus
      serviceMap:
        datasourceUid: defenseclaw-prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: defenseclaw-loki
