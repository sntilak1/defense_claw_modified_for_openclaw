global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Self-metrics from the OTel Collector.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector

  # Metrics exported by the collector's prometheus exporter (fallback
  # path when remote_write is disabled).
  - job_name: otel-collector-export
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: defenseclaw-prometheus-export
